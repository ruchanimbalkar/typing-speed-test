<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <link rel="stylesheet" href="css/styles.css" />
    <title>Frontend Mentor | Typing Speed Test</title>
  </head>
  <body>
    <header>
      <img src="images/logo-large.svg" alt="Typing test logo" />
      <!-- PB -->
      <div class="personalbest">
        <img src="images/icon-personal-best.svg" alt="trpophy icon" />
        <p>Personal best : <span class="personalbestspan"> </span></p>
      </div>
    </header>

    <main>
      <div>
        <p>
          <!-- WPM -->
          WPM: <span class="wpm"> </span> |
          <!-- Accuracy -->
          Accuracy: <span class="accuracy"> 94% </span> |
          <!-- Time -->
          Time: <span id="time"> 0 </span>
        </p>
      </div>
      <div>
        <div class="menuDiv">
          <label>
            Difficulty:
            <button class="easyBtn">Easy</button>
            <button class="medBtn">Medium</button>
            <button class="hardBtn">Hard</button>
          </label>
          <label>
            Mode:
            <button>Timed (60s)</button>
            <button>Passage</button>
          </label>
          <!-- Passage To Type-->
          <div class="textToType"></div>
        </div>
        <button class="startBtn">start</button>
        <div class="resultDiv"></div>
        <div class="formDiv">
          <form>
            <textarea id="userInput" name="userInput" rows="10" cols="33">
            </textarea>
          </form>
        </div>
        <button class="goAgainBtn">Go Again</button>
      </div>
    </main>

    <!-- Test Complete Start -->

    <!-- WPM -->
    Accuracy:
    <!-- Accuracy -->
    Characters:
    <!-- Correct/Incorrect -->

    Go Again

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Rucha Nimbalkar</a>.
    </footer>
    <script src="./js/script.js" type="module"></script>
  </body>
</html>
